<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Temperature Converter</h1>
  <div>
    <label for="celsius">Enter the Celsius Value: </label>
    <input type="number" id="celsius" name="celsius"/>
    <input type="submit" onclick="convertCelsius()"/>
    <p id="result"></p>
  </div>

  <div>
    <label for="fahrenheit">Enter the Fahrenheit Value: </label>
    <input type="number" id="fahrenheit" name="fahrenheit"/>
    <input type="submit" onclick="convertFahrenheit()"/>
    <p id="result"></p>
  </div>
  
</body>
<script src="script.js"></script>
</html>
